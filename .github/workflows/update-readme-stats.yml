name: Update Language Stats

on:
  schedule:
    # Jalan otomatis setiap hari jam 00:00 UTC (07:00 WIB)
    - cron: "0 0 * * *"
  workflow_dispatch: {} # supaya bisa dipicu manual dari tab Actions
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Hitung ulang statistik bahasa
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-language-stats.js

      - name: Commit perubahan README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update language stats otomatis"
          git push
